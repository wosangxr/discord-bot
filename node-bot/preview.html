<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Card Preview Tool</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 30px;
            min-height: 100vh;
        }
        h1 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #e0c0ff;
        }
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab {
            padding: 10px 30px;
            border: 2px solid #444;
            border-radius: 10px;
            cursor: pointer;
            background: transparent;
            color: #aaa;
            font-size: 16px;
            transition: all 0.3s;
        }
        .tab.active {
            border-color: #a78bfa;
            color: #e0c0ff;
            background: rgba(167, 139, 250, 0.15);
        }
        .tab:hover { border-color: #a78bfa; }
        .preview-container {
            border: 2px solid #333;
            border-radius: 12px;
            overflow: hidden;
            margin-bottom: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
        }
        canvas { display: block; }
        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
            max-width: 800px;
            width: 100%;
        }
        .control-group {
            background: rgba(255,255,255,0.05);
            padding: 16px;
            border-radius: 10px;
            border: 1px solid #333;
        }
        .control-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            color: #a78bfa;
            font-weight: bold;
        }
        .control-group input[type="range"] {
            width: 100%;
            accent-color: #a78bfa;
        }
        .value {
            text-align: center;
            font-size: 20px;
            font-weight: bold;
            color: #fff;
            margin-top: 6px;
        }
        .code-output {
            margin-top: 30px;
            background: #0d1117;
            padding: 20px;
            border-radius: 10px;
            max-width: 800px;
            width: 100%;
            border: 1px solid #333;
        }
        .code-output h3 {
            color: #a78bfa;
            margin-bottom: 10px;
            font-size: 14px;
        }
        .code-output code {
            color: #7ee787;
            font-family: 'Consolas', monospace;
            font-size: 14px;
            line-height: 1.6;
        }
        .note {
            margin-top: 15px;
            color: #888;
            font-size: 13px;
            text-align: center;
        }
    </style>
</head>
<body>
    <h1>🎨 Card Preview Tool</h1>

    <div class="tabs">
        <button class="tab active" onclick="switchType('welcome')">Welcome</button>
        <button class="tab" onclick="switchType('goodbye')">Goodbye</button>
    </div>

    <div class="preview-container">
        <canvas id="preview" width="1000" height="500"></canvas>
    </div>

    <div class="controls">
        <div class="control-group">
            <label>ตำแหน่ง X (ซ้าย-ขวา)</label>
            <input type="range" id="avatarX" min="50" max="950" value="500" oninput="draw()">
            <div class="value" id="valX">500</div>
        </div>
        <div class="control-group">
            <label>ตำแหน่ง Y (บน-ล่าง)</label>
            <input type="range" id="avatarY" min="50" max="450" value="175" oninput="draw()">
            <div class="value" id="valY">175</div>
        </div>
        <div class="control-group">
            <label>ขนาด R (รัศมี)</label>
            <input type="range" id="avatarR" min="30" max="200" value="80" oninput="draw()">
            <div class="value" id="valR">80</div>
        </div>
    </div>

    <div class="code-output">
        <h3>📋 คัดลอกโค้ดนี้ไปวางแทนบรรทัด 139-141 ใน index.js:</h3>
        <code id="codeOutput"></code>
    </div>

    <p class="note">💡 ลาก slider ปรับค่า แล้วดู preview ทันที — Avatar ตัวอย่างจะเป็นวงกลมสีม่วง</p>

    <script>
        const canvas = document.getElementById('preview');
        const ctx = canvas.getContext('2d');

        let currentType = 'welcome';
        let welcomeBg = new Image();
        let goodbyeBg = new Image();
        let sampleAvatar = null;

        // โหลด background images
        welcomeBg.src = 'assets/welcome_bg.png';
        goodbyeBg.src = 'assets/goodbye_bg.png';

        welcomeBg.onload = () => draw();
        goodbyeBg.onload = () => draw();

        // สร้าง sample avatar (วงกลมสีม่วง gradient)
        function drawSampleAvatar(x, y, r) {
            const grad = ctx.createRadialGradient(x - r*0.3, y - r*0.3, r*0.1, x, y, r);
            grad.addColorStop(0, '#c084fc');
            grad.addColorStop(0.7, '#7c3aed');
            grad.addColorStop(1, '#4c1d95');
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.closePath();
            ctx.clip();
            ctx.fillStyle = grad;
            ctx.fillRect(x - r, y - r, r * 2, r * 2);

            // วาดหัว+ตัวคน
            ctx.fillStyle = '#ddd6fe';
            ctx.beginPath();
            ctx.arc(x, y - r * 0.15, r * 0.35, 0, Math.PI * 2);
            ctx.fill();
            ctx.beginPath();
            ctx.ellipse(x, y + r * 0.55, r * 0.45, r * 0.35, 0, Math.PI, 0);
            ctx.fill();

            ctx.restore();

            // Glow effect (welcome only)
            if (currentType === 'welcome') {
                for (let i = 3; i >= 1; i--) {
                    ctx.beginPath();
                    ctx.arc(x, y, r + i * 4, 0, Math.PI * 2);
                    ctx.strokeStyle = `rgba(200, 180, 255, ${0.15 / i})`;
                    ctx.lineWidth = 2;
                    ctx.stroke();
                }
            }

            // Shine
            ctx.save();
            ctx.beginPath();
            ctx.arc(x, y, r, 0, Math.PI * 2);
            ctx.clip();
            const shine = ctx.createRadialGradient(x - r*0.3, y - r*0.4, r*0.1, x, y, r);
            shine.addColorStop(0, 'rgba(255, 255, 255, 0.2)');
            shine.addColorStop(1, 'rgba(255, 255, 255, 0)');
            ctx.fillStyle = shine;
            ctx.fillRect(x - r, y - r, r * 2, r * 2);
            ctx.restore();
        }

        function draw() {
            const x = parseInt(document.getElementById('avatarX').value);
            const y = parseInt(document.getElementById('avatarY').value);
            const r = parseInt(document.getElementById('avatarR').value);

            document.getElementById('valX').textContent = x;
            document.getElementById('valY').textContent = y;
            document.getElementById('valR').textContent = r;

            // Clear
            ctx.clearRect(0, 0, 1000, 500);

            // Draw background
            const bg = currentType === 'welcome' ? welcomeBg : goodbyeBg;
            if (bg.complete && bg.naturalWidth > 0) {
                ctx.drawImage(bg, 0, 0, 1000, 500);
            } else {
                // Fallback gradient
                const gradient = ctx.createLinearGradient(0, 0, 1000, 500);
                if (currentType === 'welcome') {
                    gradient.addColorStop(0, '#1a0533');
                    gradient.addColorStop(1, '#2d1b69');
                } else {
                    gradient.addColorStop(0, '#87CEEB');
                    gradient.addColorStop(1, '#b0d4f1');
                }
                ctx.fillStyle = gradient;
                ctx.fillRect(0, 0, 1000, 500);
            }

            // Draw crosshair guide
            ctx.strokeStyle = 'rgba(255, 255, 0, 0.3)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]);
            ctx.beginPath();
            ctx.moveTo(x, 0); ctx.lineTo(x, 500);
            ctx.moveTo(0, y); ctx.lineTo(1000, y);
            ctx.stroke();
            ctx.setLineDash([]);

            // Draw avatar
            drawSampleAvatar(x, y, r);

            // Update code output
            updateCode(x, y, r);
        }

        function updateCode(x, y, r) {
            // Store values per type
            if (currentType === 'welcome') {
                window.welcomeVals = { x, y, r };
            } else {
                window.goodbyeVals = { x, y, r };
            }

            const w = window.welcomeVals || { x: 500, y: 175, r: 80 };
            const g = window.goodbyeVals || { x: 500, y: 170, r: 90 };

            document.getElementById('codeOutput').innerHTML =
                `    const avatarX = type === 'welcome' ? ${w.x} : ${g.x};<br>` +
                `    const avatarY = type === 'welcome' ? ${w.y} : ${g.y};<br>` +
                `    const avatarR = type === 'welcome' ? ${w.r} : ${g.r};`;
        }

        function switchType(type) {
            currentType = type;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');

            // Load saved values for this type
            const saved = type === 'welcome' ? window.welcomeVals : window.goodbyeVals;
            if (saved) {
                document.getElementById('avatarX').value = saved.x;
                document.getElementById('avatarY').value = saved.y;
                document.getElementById('avatarR').value = saved.r;
            } else {
                document.getElementById('avatarX').value = type === 'welcome' ? 500 : 500;
                document.getElementById('avatarY').value = type === 'welcome' ? 175 : 170;
                document.getElementById('avatarR').value = type === 'welcome' ? 80 : 90;
            }

            draw();
        }

        // Initial draw
        draw();
    </script>
</body>
</html>
